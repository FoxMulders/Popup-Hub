name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Daily production smoke (UTC noon)
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Layout QA
        run: npm run qa:layout

      - name: Signup RBAC
        run: npm run test:rbac-signup

      - name: Shopper routing
        run: npm run test:shopper-routing

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  prod-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production HTTP smoke
        run: npm run verify:prod

  # Full Playwright workflow (local dev + Supabase secrets):
  # PLAYWRIGHT_SKIP_WEBSERVER=1 npm run test:e2e:workflow
  # Prod browser smoke:
  # PLAYWRIGHT_BASE_URL=https://popuphub.ca PLAYWRIGHT_SKIP_WEBSERVER=1 npm run qa:automation:prod
