name: Deploy to TestFlight

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare signing keychain for cloud-managed distribution
        run: |
          # Pure cloud-managed signing via Admin ASC API key + -allowProvisioningUpdates.
          # No local .p12 import — Xcode mints the distribution cert/profile in the cloud and
          # stores the generated private key in this transient, unlocked keychain.
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          # No keys exist yet (cloud signing mints the private key during archive), so a
          # partition-list set here would fail with "item could not be found". Tolerate it;
          # the keychain is unlocked with no timeout so codesign can use the minted key.
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH 2>/dev/null || true
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Write the .p8 to both a stable path (for -authenticationKeyPath) and the
          # default search dir so archive (auto signing) and export can authenticate.
          KEY_DIR=$RUNNER_TEMP/private_keys
          mkdir -p "$KEY_DIR" ~/.appstoreconnect/private_keys
          KEY_PATH="$KEY_DIR/AuthKey_$API_KEY_ID.p8"
          echo "$API_KEY_CONTENT" > "$KEY_PATH"
          cp "$KEY_PATH" ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "ASC_KEY_ID=$API_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$API_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Build Web App and Sync Capacitor
        run: |
          npm run build
          npx cap sync ios

      - name: Build and Archive Xcode Project
        run: |
          # Cloud-managed automatic signing for a Release archive. Admin ASC API key +
          # -allowProvisioningUpdates mints distribution cert + App Store profile. Entitlements
          # are empty (no aps-environment), so signing won't drift toward Development.
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     archive \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$ASC_KEY_PATH" \
                     -authenticationKeyID "$ASC_KEY_ID" \
                     -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
                     DEVELOPMENT_TEAM=6ACBDTX7T7 \
                     CODE_SIGN_STYLE=Automatic \
                     OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Upload Build to TestFlight
        run: |
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     -exportPath $RUNNER_TEMP/exported \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$ASC_KEY_PATH" \
                     -authenticationKeyID "$ASC_KEY_ID" \
                     -authenticationKeyIssuerID "$ASC_ISSUER_ID"