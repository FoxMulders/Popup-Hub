name: Deploy to TestFlight

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Apple Certificate & Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/PopupHub_TestFlight_Profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create transient keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # 1. Delete the item if it already exists to prevent collision
          security delete-certificate -c "Apple Distribution: Brad Mulders (6ACBDTX7T7)" || true
          
          # 2. Import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12

          # Import Apple WWDR intermediate
          curl -fSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o $RUNNER_TEMP/wwdr.cer
          security import $RUNNER_TEMP/wwdr.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/security

          # Set partition list
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH

          # Set default keychain
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # Verify identity
          IDENTITIES=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")
          echo "$IDENTITIES"
          if ! echo "$IDENTITIES" | grep -q "Apple Distribution"; then
            echo "::error::No 'Apple Distribution' identity found." >&2
            exit 1
          fi

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Web App and Sync Capacitor
        run: |
          npm run build
          npx cap sync ios

      - name: Build and Archive Xcode Project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     archive \
                     DEVELOPMENT_TEAM=6ACBDTX7T7 \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     PROVISIONING_PROFILE_SPECIFIER="PopupHub_TestFlight_Profile" \
                     OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Upload Build to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     -exportPath $RUNNER_TEMP/exported \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -allowProvisioningUpdates \
                     -apiKey $API_KEY_ID \
                     -apiIssuer $API_ISSUER_ID