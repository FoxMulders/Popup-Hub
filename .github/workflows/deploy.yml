name: Deploy to TestFlight

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Apple Certificate & Distribution Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/PopupHub_AppStore_Profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate + App Store distribution profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create transient keychain (delete any stale one first so re-runs are idempotent)
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import certificate to keychain (must be a .p12/.pfx that includes the private key)
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12

          # Import Apple WWDR intermediate so the leaf cert chains to a trusted root.
          # The .p12 usually already bundles WWDR, so "already exists" is expected and non-fatal.
          curl -fSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o $RUNNER_TEMP/wwdr.cer
          WWDR_OUT=$(security import $RUNNER_TEMP/wwdr.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/security 2>&1) || true
          echo "$WWDR_OUT"
          if echo "$WWDR_OUT" | grep -qi "already exists"; then
            echo "WWDR intermediate already present in keychain - continuing."
          elif echo "$WWDR_OUT" | grep -qi "1 certificate imported"; then
            echo "WWDR intermediate imported."
          else
            echo "::warning::Unexpected WWDR import result (continuing): $WWDR_OUT"
          fi

          # Allow codesign to use the key without an interactive prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH

          # Set explicitly on user search list and as default keychain
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # Verify a usable Apple Distribution identity is present
          echo "== Valid code-signing identities in transient keychain =="
          IDENTITIES=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")
          echo "$IDENTITIES"
          if ! echo "$IDENTITIES" | grep -q "Apple Distribution"; then
            echo "::error::No 'Apple Distribution' identity with a private key in keychain. Re-export BUILD_CERTIFICATE_BASE64 as a .p12/.pfx of the Apple Distribution *identity* (cert + private key), not the public .cer, and make sure P12_PASSWORD matches the export password." >&2
            exit 1
          fi
          echo "$IDENTITIES" | grep -q "6ACBDTX7T7" || echo "::warning::Distribution identity present but not for team 6ACBDTX7T7 — verify the certificate's team."

          # TestFlight requires a DISTRIBUTION profile. On headless CI (no registered devices)
          # automatic signing resolves an iOS App Development profile during archive and fails,
          # so we sign the archive MANUALLY with the App Store distribution profile from secrets.
          PROFILE_PLIST=$RUNNER_TEMP/profile.plist
          security cms -D -i "$PP_PATH" -o "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          echo "Distribution profile: $PROFILE_NAME ($PROFILE_UUID)"

          # Sanity: the profile must be an App Store profile (no ProvisionedDevices key) and
          # must embed the distribution cert we just imported. Warn loudly if it looks like a
          # Development profile so the failure mode is obvious in logs.
          if /usr/libexec/PlistBuddy -c "Print :ProvisionedDevices" "$PROFILE_PLIST" >/dev/null 2>&1; then
            echo "::warning::BUILD_PROVISION_PROFILE_BASE64 contains a device-limited (Development/Ad Hoc) profile. TestFlight needs an App Store distribution profile for ca.popuphub.app."
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

          # Fail fast if the profile was built for a different distribution cert than the .p12
          CERT_FP=$(openssl pkcs12 -in "$CERTIFICATE_PATH" -passin pass:"$P12_PASSWORD" -nokeys -clcerts 2>/dev/null \
            | openssl x509 -noout -fingerprint -sha1 | sed 's/.*=//;s/://g' | tr '[:lower:]' '[:upper:]')
          PROFILE_FP=$(/usr/libexec/PlistBuddy -c "Print :DeveloperCertificates:0" "$PROFILE_PLIST" \
            | openssl base64 -d -A | openssl x509 -inform DER -noout -fingerprint -sha1 \
            | sed 's/.*=//;s/://g' | tr '[:lower:]' '[:upper:]')
          echo "Distribution cert SHA1: $CERT_FP"
          echo "Profile embedded cert SHA1: $PROFILE_FP"
          if [ "$CERT_FP" != "$PROFILE_FP" ]; then
            echo "::error::BUILD_PROVISION_PROFILE_BASE64 does not include the Apple Distribution cert from BUILD_CERTIFICATE_BASE64. Re-export an App Store profile for ca.popuphub.app that includes the current distribution identity, then update the secret." >&2
            exit 1
          fi

          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Write the .p8 to both a stable path (for -authenticationKeyPath) and the
          # default search dir so archive (auto signing) and export can authenticate.
          KEY_DIR=$RUNNER_TEMP/private_keys
          mkdir -p "$KEY_DIR" ~/.appstoreconnect/private_keys
          KEY_PATH="$KEY_DIR/AuthKey_$API_KEY_ID.p8"
          echo "$API_KEY_CONTENT" > "$KEY_PATH"
          cp "$KEY_PATH" ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "ASC_KEY_ID=$API_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$API_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Build Web App and Sync Capacitor
        run: |
          npm run build
          npx cap sync ios

      - name: Build and Archive Xcode Project
        run: |
          # Manual distribution signing. TestFlight needs an App Store distribution profile;
          # pinning CODE_SIGN_IDENTITY=Apple Distribution + the decoded profile keeps archive
          # from ever falling back to an iOS App Development profile (which CI has no devices for).
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     archive \
                     DEVELOPMENT_TEAM=6ACBDTX7T7 \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
                     OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Upload Build to TestFlight
        run: |
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     -exportPath $RUNNER_TEMP/exported \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath "$ASC_KEY_PATH" \
                     -authenticationKeyID "$ASC_KEY_ID" \
                     -authenticationKeyIssuerID "$ASC_ISSUER_ID"