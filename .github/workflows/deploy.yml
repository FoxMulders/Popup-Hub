name: Deploy to TestFlight

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-26
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Select Xcode 26.4.1 (iOS 26 SDK)
        # App Store Connect requires builds made with the iOS 26 SDK (Xcode 26+).
        # Pin 26.4.1 explicitly: Xcode 26.5 actool crashes on AppIcon.icon (Liquid Glass)
        # during CompileAssetCatalogVariant. Do not use latest-stable until Apple fixes actool.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Verify iOS SDK is 26 or later
        run: |
          set -euo pipefail
          xcodebuild -version
          XCODE_VERSION=$(xcodebuild -version | awk 'NR==1 {print $2}')
          XCODE_MAJOR=${XCODE_VERSION%%.*}
          XCODE_MINOR_PATCH=${XCODE_VERSION#*.}
          XCODE_MINOR=${XCODE_MINOR_PATCH%%.*}
          XCODE_PATCH=${XCODE_MINOR_PATCH#*.}
          echo "Selected Xcode version: $XCODE_VERSION"
          if [ "$XCODE_MAJOR" -gt 26 ] || { [ "$XCODE_MAJOR" -eq 26 ] && [ "$XCODE_MINOR" -ge 5 ]; }; then
            echo "::error::Xcode $XCODE_VERSION is >= 26.5. actool crashes when compiling AppIcon.icon (Liquid Glass). Pin deploy.yml to xcode-version: '26.4.1'."
            exit 1
          fi
          SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "iphoneos SDK version: $SDK_VERSION"
          MAJOR=${SDK_VERSION%%.*}
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::iOS SDK $SDK_VERSION is older than 26. App Store Connect rejects these builds (ITMS-90725). Ensure Xcode 26+ is available on the runner."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare signing keychain
        run: |
          # Transient, unlocked keychain that holds the imported Apple Distribution identity
          # (see next step). Reusing one stored cert avoids the certificate-quota exhaustion
          # that pure cloud minting hits (a fresh runner mints a NEW cert every run until the
          # account's Distribution-cert cap is reached).
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Import Apple Distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          # Import ONE Apple Distribution cert + private key into the keychain the archive uses.
          # Manual signing pairs this identity with the App Store profiles installed in the next
          # step. No cert/profile is ever minted on the portal, so the Apple certificate quota is
          # never touched (the recurring "Choose a certificate to revoke" failure).
          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ]; then
            echo "::error::BUILD_CERTIFICATE_BASE64 secret is not set. Export a valid (non-revoked) Apple Distribution certificate as a .p12, base64-encode it, and store it as BUILD_CERTIFICATE_BASE64 (with P12_PASSWORD). This lets CI reuse one certificate instead of exhausting the Apple certificate quota."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          # Strip any whitespace/newlines a copy-paste into the GitHub secret UI may have
          # introduced before decoding — a single stray char makes the .p12 unparseable and
          # produces the "security: problem decoding ... (-8183)" failure.
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | tr -d '[:space:]' | base64 --decode > "$CERT_PATH" 2>/dev/null || true

          if [ ! -s "$CERT_PATH" ]; then
            echo "::error::Decoded certificate is empty. BUILD_CERTIFICATE_BASE64 is not valid base64 of a .p12 — re-run 'base64 -i your-dist.p12 | pbcopy' and paste the full output into the secret."
            exit 1
          fi
          echo "Decoded .p12 size: $(wc -c < "$CERT_PATH") bytes ($(file -b "$CERT_PATH"))"

          # Apple-recommended import flags (see Apple's "Installing an Apple certificate on macOS
          # runners" docs). -A grants keychain access to all tools; the partition-list call then
          # lets codesign/xcodebuild use the key without an interactive prompt.
          if ! security import "$CERT_PATH" -P "${P12_PASSWORD:-}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" 2>"$RUNNER_TEMP/import.log"; then
            cat "$RUNNER_TEMP/import.log" >&2
            # macOS `security` cannot decode .p12 files produced with modern OpenSSL 3
            # encryption (AES-256-CBC / PBKDF2) — the exact "-8183 / problem decoding" error.
            # Re-export the bundle through the runner's OpenSSL into a legacy-compatible .p12
            # (3DES) that `security import` accepts, preserving the same password. The read side
            # is attempted with and without -legacy because the runner may ship OpenSSL 3
            # (has -legacy) or LibreSSL (does not), and old exports may use RC2 (needs -legacy).
            echo "Direct import failed — re-encoding .p12 to a security-compatible format via OpenSSL."
            echo "openssl: $(openssl version)"
            COMPAT_PATH="$RUNNER_TEMP/build_certificate_compat.p12"
            PEM_PATH="$RUNNER_TEMP/build_certificate.pem"

            read_p12() {
              openssl pkcs12 -in "$CERT_PATH" -nodes -passin "pass:${P12_PASSWORD:-}" -out "$PEM_PATH" 2>/dev/null \
                || openssl pkcs12 -in "$CERT_PATH" -nodes -legacy -passin "pass:${P12_PASSWORD:-}" -out "$PEM_PATH" 2>/dev/null
            }

            if ! read_p12 || [ ! -s "$PEM_PATH" ]; then
              echo "::error::Could not read the .p12 with OpenSSL. P12_PASSWORD is likely wrong, or BUILD_CERTIFICATE_BASE64 is not a real Apple Distribution .p12. Re-export the identity from Keychain Access (right-click > Export, set a password) and update both secrets."
              exit 1
            fi

            openssl pkcs12 -export -out "$COMPAT_PATH" -in "$PEM_PATH" -passout "pass:${P12_PASSWORD:-}" \
              -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -macalg sha1 \
              || {
                echo "::error::Could not re-encode the .p12 into a security-compatible format."
                exit 1
              }
            rm -f "$PEM_PATH"
            security import "$COMPAT_PATH" -P "${P12_PASSWORD:-}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            rm -f "$COMPAT_PATH"
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH" >/dev/null

          rm -f "$CERT_PATH"

          echo "Code-signing identities available to the archive:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install App Store provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          WIDGET_PROFILE_BASE64: ${{ secrets.BUILD_WIDGET_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          # Manual signing: install the App Store distribution profiles for BOTH the app and
          # the widget extension. No -allowProvisioningUpdates is used in archive/export, so
          # xcodebuild never contacts the portal to mint certs/profiles — this is what makes the
          # build immune to the Apple certificate-quota wall and the headless "iOS App Development"
          # profile drift documented in PM/ios-testflight.md.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          install_profile() {
            local b64="$1" label="$2" expected_name="$3"
            if [ -z "${b64:-}" ]; then
              echo "::error::$label provisioning profile secret is empty. Create an App Store distribution profile in the Apple Developer portal, base64-encode the .mobileprovision, and set the matching GitHub secret."
              exit 1
            fi
            local raw="$RUNNER_TEMP/$label.mobileprovision"
            local plist="$RUNNER_TEMP/$label.plist"
            # Strip whitespace a copy-paste into the GitHub secret UI may have introduced —
            # a single stray char makes the profile unparseable and produces the same
            # "security: problem decoding ... (-8183)" failure as a bad .p12 secret.
            printf '%s' "$b64" | tr -d '[:space:]' | base64 --decode > "$raw" 2>/dev/null || true
            if [ ! -s "$raw" ]; then
              echo "::error::Decoded $label profile is empty. The $label secret is not valid base64 of a .mobileprovision — re-run 'base64 -i <file>.mobileprovision | pbcopy' and paste the full output into BUILD_PROVISION_PROFILE_BASE64 or BUILD_WIDGET_PROVISION_PROFILE_BASE64."
              exit 1
            fi
            echo "Decoded $label profile size: $(wc -c < "$raw") bytes ($(file -b "$raw"))"
            if ! security cms -D -i "$raw" > "$plist" 2>"$RUNNER_TEMP/$label-cms.log"; then
              cat "$RUNNER_TEMP/$label-cms.log" >&2
              echo "::error::$label profile is not a valid .mobileprovision (security cms decode failed). Re-download from Apple Developer portal and re-encode with 'base64 -i <file>.mobileprovision'."
              exit 1
            fi
            local uuid name
            uuid=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist")
            name=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$plist")
            echo "$label profile → name='$name' uuid=$uuid"
            if [ "$name" != "$expected_name" ]; then
              echo "::error::$label profile is named '$name' but the project expects '$expected_name'. Rename the profile in the Apple portal (or update PROVISIONING_PROFILE_SPECIFIER in project.pbxproj + ExportOptions.plist) so they match exactly."
              exit 1
            fi
            cp "$raw" "$PROFILES_DIR/$uuid.mobileprovision"
          }

          install_profile "$APP_PROFILE_BASE64" "App" "PopupHub App Store"
          install_profile "$WIDGET_PROFILE_BASE64" "Widget" "PopupHub Widget App Store"

      - name: Prepare App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # Write the .p8 to both a stable path (for -authenticationKeyPath) and the
          # default search dir so the export step can authenticate the TestFlight upload.
          KEY_DIR=$RUNNER_TEMP/private_keys
          mkdir -p "$KEY_DIR" ~/.appstoreconnect/private_keys
          KEY_PATH="$KEY_DIR/AuthKey_$API_KEY_ID.p8"
          echo "$API_KEY_CONTENT" > "$KEY_PATH"
          cp "$KEY_PATH" ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "ASC_KEY_ID=$API_KEY_ID" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$API_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Build Web App and Sync Capacitor
        run: |
          npm run build
          npm run assets:logo
          npm run mobile:assets
          npx cap sync ios

      - name: Smoke test AppIcon.icon asset compilation
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/actool-smoke"
          xcrun actool ios/App/App/AppIcon.icon ios/App/App/Assets.xcassets \
            --compile "$RUNNER_TEMP/actool-smoke" \
            --platform iphoneos \
            --app-icon AppIcon \
            --output-partial-info-plist "$RUNNER_TEMP/actool-smoke.plist" \
            --output-format human-readable-text
          echo "actool smoke test passed"

      - name: Build and Archive Xcode Project
        run: |
          # Manual distribution signing. Each target's PROVISIONING_PROFILE_SPECIFIER comes from
          # project.pbxproj (App → "PopupHub App Store", widget → "PopupHub Widget App Store");
          # the profiles were installed by the previous step. No -allowProvisioningUpdates and no
          # ASC API key here, so xcodebuild signs entirely from the imported Apple Distribution
          # cert + the installed profiles and never contacts the portal to mint anything.
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     archive \
                     DEVELOPMENT_TEAM=6ACBDTX7T7 \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Upload Build to TestFlight
        run: |
          # Manual signing on export too (ExportOptions.plist pins signingStyle=manual +
          # provisioningProfiles for both bundle ids). The ASC API key is kept ONLY to
          # authenticate the TestFlight upload (destination=upload), not to mint signing assets.
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/App.xcarchive \
                     -exportPath $RUNNER_TEMP/exported \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -authenticationKeyPath "$ASC_KEY_PATH" \
                     -authenticationKeyID "$ASC_KEY_ID" \
                     -authenticationKeyIssuerID "$ASC_ISSUER_ID"