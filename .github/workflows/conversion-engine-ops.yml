name: Conversion Engine Ops

on:
  workflow_dispatch:
    inputs:
      run_db_push:
        description: Apply Supabase migrations (db push)
        type: boolean
        default: true
      run_seed:
        description: Seed external listing on a test event
        type: boolean
        default: true
      run_vercel_deploy:
        description: Deploy web app to Vercel production
        type: boolean
        default: true
      event_name:
        description: Event name substring for seed (optional)
        required: false
        type: string
        default: Market Test 3

jobs:
  ops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Supabase login
        if: inputs.run_db_push == true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not configured"
            exit 1
          fi
          npx supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Supabase project
        if: inputs.run_db_push == true
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not configured"
            exit 1
          fi
          npx supabase link --project-ref ensbggtbgabogvynqsqt --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        if: inputs.run_db_push == true
        run: npm run db:push

      - name: Seed external listing test market
        if: inputs.run_seed == true
        id: seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONVERSION_ENGINE_EVENT_NAME: ${{ inputs.event_name }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Supabase URL/service role secrets are required for seeding"
            exit 1
          fi
          OUTPUT=$(npx tsx scripts/seed-external-listing-market.ts)
          echo "$OUTPUT"
          EVENT_ID=$(echo "$OUTPUT" | sed -n 's/^EVENT_ID=//p' | tail -1)
          if [ -z "$EVENT_ID" ]; then
            echo "::error::Seed script did not return EVENT_ID"
            exit 1
          fi
          echo "event_id=$EVENT_ID" >> "$GITHUB_OUTPUT"

      - name: Verify conversion engine
        if: inputs.run_seed == true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONVERSION_ENGINE_EVENT_ID: ${{ steps.seed.outputs.event_id }}
          CONVERSION_ENGINE_BASE_URL: https://popuphub.ca
        run: npx tsx scripts/verify-conversion-engine.ts --live

      - name: Deploy Vercel production
        if: inputs.run_vercel_deploy == true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN secret is not configured"
            exit 1
          fi
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
