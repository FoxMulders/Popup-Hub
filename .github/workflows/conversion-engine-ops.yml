name: Conversion Engine Ops

on:
  workflow_dispatch:
    inputs:
      run_db_push:
        description: Apply Supabase migrations (db push)
        type: boolean
        default: true
      run_seed:
        description: Seed external listing on a test event
        type: boolean
        default: true
      run_vercel_deploy:
        description: Deploy web app to Vercel production
        type: boolean
        default: true
      event_name:
        description: Event name substring for seed (optional)
        required: false
        type: string
        default: Market Test 3
  push:
    branches: [master]
    paths:
      - '.github/workflows/conversion-engine-ops.yml'
      - 'supabase/migrations/136_conversion_engine_external_listing.sql'
      - 'scripts/seed-external-listing-market.ts'
      - 'scripts/verify-conversion-engine.ts'

jobs:
  ops:
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.event_name || 'Market Test 3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Supabase login
        if: github.event_name != 'workflow_dispatch' || inputs.run_db_push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not configured"
            exit 1
          fi
          npx supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Supabase project
        if: github.event_name != 'workflow_dispatch' || inputs.run_db_push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not configured"
            exit 1
          fi
          npx supabase link --project-ref ensbggtbgabogvynqsqt --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        if: github.event_name != 'workflow_dispatch' || inputs.run_db_push
        run: npm run db:push

      - name: Seed external listing test market
        if: github.event_name != 'workflow_dispatch' || inputs.run_seed
        id: seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONVERSION_ENGINE_EVENT_NAME: ${{ env.EVENT_NAME }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Supabase URL/service role secrets are required for seeding"
            exit 1
          fi
          OUTPUT=$(npx tsx scripts/seed-external-listing-market.ts)
          echo "$OUTPUT"
          EVENT_ID=$(echo "$OUTPUT" | sed -n 's/^EVENT_ID=//p' | tail -1)
          if [ -z "$EVENT_ID" ]; then
            echo "::error::Seed script did not return EVENT_ID"
            exit 1
          fi
          echo "event_id=$EVENT_ID" >> "$GITHUB_OUTPUT"

      - name: Verify conversion engine
        if: (github.event_name != 'workflow_dispatch' || inputs.run_seed) && steps.seed.outputs.event_id != ''
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONVERSION_ENGINE_EVENT_ID: ${{ steps.seed.outputs.event_id }}
          CONVERSION_ENGINE_BASE_URL: https://popuphub.ca
        run: npx tsx scripts/verify-conversion-engine.ts --live

      - name: Deploy Vercel production
        if: github.event_name != 'workflow_dispatch' || inputs.run_vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::error::VERCEL_TOKEN secret is not configured"
            exit 1
          fi
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Summary
        if: always() && steps.seed.outputs.event_id != ''
        run: |
          echo "Conversion Engine QA event: ${{ steps.seed.outputs.event_id }}"
          echo "Studio URL: https://popuphub.ca/coordinator/studio?event=${{ steps.seed.outputs.event_id }}"
